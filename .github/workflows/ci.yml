name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Trustlist.sln

      - name: Build (Release)
        run: dotnet build Trustlist.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test tests/Trustlist.Tests -c Release --no-build --logger "console;verbosity=normal"
